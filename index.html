<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시은가은 두더지게임 V2</title>
    <style>
        :root {
            --primary: #FF9800; --danger: #FF5252;
            --bg-grad: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }
        body {
            text-align: center; font-family: 'Nanum Gothic', sans-serif;
            background: var(--bg-grad); margin: 0; padding: 0;
            height: 100vh; overflow: hidden; touch-action: manipulation; user-select: none;
        }
        h2 { margin: 15px 0; color: #333; font-size: 26px; }
        
        #info-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .info-card {
            background: rgba(255, 255, 255, 0.9); padding: 8px 12px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; min-width: 60px;
        }
        .info-label { font-size: 10px; color: #666; display: block; margin-bottom: 2px; }
        .info-value { font-size: 18px; color: #333; }
        
        #board {
            width: 92vw; max-width: 380px; margin: 5px auto;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .hole {
            width: 100%; aspect-ratio: 1/1; background: #5d4037; border-radius: 50%;
            position: relative; overflow: hidden; box-shadow: inset 0 8px 15px rgba(0,0,0,0.5);
        }
        .character {
            width: 100%; height: 100%; position: absolute; bottom: -100%; left: 0;
            transition: bottom 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            pointer-events: none;
        }
        .character img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
        .hole.up .character { bottom: 10%; }
        
        .effect-text {
            position: fixed; pointer-events: none; font-weight: 900; z-index: 5000;
            font-size: 35px; text-shadow: 2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white;
            animation: scorePop 0.8s ease-out forwards;
            transform: translate(-50%, -50%);
        }
        @keyframes scorePop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.3); opacity: 0; }
        }

        .full-overlay-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 4000; pointer-events: none;
        }
        .msg-content { font-size: 60px; font-weight: 900; color: white; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); animation: msgZoom 1s ease-out forwards; }
        @keyframes msgZoom { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        .main-btn {
            background: var(--primary); color: white; border: none; padding: 12px 35px;
            font-size: 20px; font-weight: bold; border-radius: 50px; box-shadow: 0 5px 0 #e68a00;
            margin-top: 15px; cursor: pointer;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center;
            align-items: center; flex-direction: column; color: white; z-index: 1500;
        }
    </style>
</head>
<body>
    <h2>시은가은 두더지게임 V2</h2>
    <div id="info-container">
        <div class="info-card"><span class="info-label">STAGE</span><span id="stage" class="info-value">1</span></div>
        <div class="info-card"><span class="info-label">SCORE</span><span id="score" class="info-value">0</span></div>
        <div class="info-card"><span class="info-label">TIME</span><span id="time" class="info-value">20</span></div>
        <div class="info-card"><span class="info-label">LIFE</span><span id="life" class="info-value" style="color:red">❤️❤️❤️</span></div>
    </div>
    <div id="board"></div>
    <button id="startBtn" class="main-btn" onclick="initGame()">게임 시작!</button>
    <div id="fullOverlay" class="full-overlay-msg"><div id="msgText" class="msg-content"></div></div>
    <div id="gameOverScreen" class="overlay">
        <h1 style="font-size: 40px; color: var(--danger);">GAME OVER</h1>
        <p id="finalScore" style="font-size: 20px; margin-bottom: 20px;"></p>
        <button class="main-btn" onclick="location.reload()">다시 도전!</button>
    </div>
    <div id="startCountdown" class="overlay" style="font-size: 100px; color: gold; font-weight: bold;"></div>

<script>
    let score = 0, time = 20, stage = 1, speed = 1500, life = 3, combo = 0;
    let gameActive = false, gameTimer = null, moleTimer = null, audioCtx = null;

    for(let i=0; i<9; i++) {
        let hole = document.createElement("div");
        hole.className = "hole";
        hole.innerHTML = `<div class="character"></div>`;
        hole.addEventListener('mousedown', (e) => handleCatch(hole, e.clientX, e.clientY));
        hole.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            const touch = e.touches[0];
            handleCatch(hole, touch.clientX, touch.clientY); 
        });
        document.getElementById("board").appendChild(hole);
    }

    function handleCatch(hole, x, y) {
        if(!gameActive || !hole.classList.contains('up')) return;
        const type = hole.dataset.type;
        hole.classList.remove('up');
        hole.dataset.type = ""; // 잡았으므로 타입을 비워줌 (놓침 로직 방지)

        let text = "", color = "yellow";
        if(type === "dad") {
            combo = 0; life--; text = "아야!"; color = "red";
            playSound(200);
            if(navigator.vibrate) navigator.vibrate(200);
            if(life <= 0) gameOver();
        } else if(type === "heart") {
            if(life < 3) life++; text = "LIFE UP! ❤️"; color = "#ff5252";
            playSound(1000);
        } else {
            combo++;
            let pts = (type === "doll") ? 20 : 10;
            score += pts; text = `+${pts}`;
            playSound(600 + (Math.min(combo, 10) * 40));
            if(combo >= 3 && combo % 3 === 0) showFullOverlay(combo + " COMBO!", "rgba(255, 255, 255, 0.1)");
        }
        updateUI();
        if (x !== undefined && y !== undefined) showScorePopup(x, y, text, color);
    }

    function showCharacters() {
        const holes = document.querySelectorAll(".hole");
        let count = (stage >= 4 && Math.random() > 0.5) ? 2 : 1;
        let chosen = [];
        
        for(let i=0; i<count; i++) {
            let idx; do { idx = Math.floor(Math.random() * 9); } while(chosen.includes(idx));
            chosen.push(idx);
            const hole = holes[idx];
            
            const r = Math.random();
            let type, content;
            if (r < 0.05) { type = "heart"; content = "❤️"; }
            else if (r < 0.25) { type = "dad"; content = "<img src='dad.png' onerror='this.outerHTML=\"👨\"'>"; }
            else if (r < 0.50) { type = "sieun"; content = "<img src='sieun.png' onerror='this.outerHTML=\"👧\"'>"; }
            else if (r < 0.75) { type = "gaeun"; content = "<img src='gaeun.png' onerror='this.outerHTML=\"👧\"'>"; }
            else { type = "doll"; content = "<img src='doll.png' onerror='this.outerHTML=\"🧸\"'>"; }
            
            hole.dataset.type = type;
            hole.querySelector(".character").innerHTML = content;
            
            setTimeout(() => { if(gameActive) hole.classList.add('up'); }, 50);
            
            let stayTime = Math.max(600, speed * 0.8);
            setTimeout(() => {
                // 아직 'up' 상태이고 타입이 그대로라면 유저가 놓친 것임
                if(hole.classList.contains('up') && hole.dataset.type === type) {
                    // 시은, 가은, 인형을 놓쳤을 때만 콤보 초기화
                    if(type !== "dad" && type !== "heart") {
                        combo = 0;
                        updateUI();
                    }
                    hole.classList.remove('up');
                    hole.dataset.type = "";
                }
            }, stayTime);
        }
    }

    function updateUI() {
        document.getElementById("stage").innerText = stage;
        document.getElementById("score").innerText = score;
        document.getElementById("time").innerText = time;
        document.getElementById("life").innerText = "❤️".repeat(life) + "🖤".repeat(3-life);
    }

    function playSound(freq) {
        try {
            if(!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            osc.stop(audioCtx.currentTime + 0.2);
        } catch(e) {}
    }

    function showScorePopup(x, y, text, color) {
        const el = document.createElement("div");
        el.className = "effect-text"; el.innerText = text; el.style.color = color;
        el.style.left = x + "px"; el.style.top = y + "px";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function showFullOverlay(text, bgColor) {
        const overlay = document.getElementById("fullOverlay");
        document.getElementById("msgText").innerText = text;
        overlay.style.backgroundColor = bgColor;
        overlay.style.display = "flex";
        setTimeout(() => { overlay.style.display = "none"; }, 1000);
    }

    function initGame() {
        score = 0; stage = 1; speed = 1500; life = 3; combo = 0; time = 20;
        document.getElementById("startBtn").style.display = "none";
        const cdOverlay = document.getElementById("startCountdown");
        cdOverlay.style.display = "flex";
        let count = 3; cdOverlay.innerText = count;
        let cdInterval = setInterval(() => {
            count--;
            if(count > 0) cdOverlay.innerText = count;
            else if(count === 0) cdOverlay.innerText = "GO!";
            else { clearInterval(cdInterval); cdOverlay.style.display = "none"; runGame(); }
        }, 800);
    }

    function runGame() {
        gameActive = true; updateUI();
        gameTimer = setInterval(() => {
            time--; document.getElementById("time").innerText = time;
            if(time <= 0) {
                gameActive = false; clearInterval(gameTimer);
                if(score >= stage * 60) nextStage();
                else gameOver();
            }
        }, 1000);
        spawnLoop();
    }

    function nextStage() {
        stage++; time = 20; speed = Math.max(650, speed * 0.85);
        showFullOverlay("STAGE " + stage, "rgba(255, 152, 0, 0.4)");
        setTimeout(runGame, 1200);
    }

    function spawnLoop() { if(gameActive) { showCharacters(); moleTimer = setTimeout(spawnLoop, speed + 250); } }

    function gameOver() {
        gameActive = false; clearInterval(gameTimer); clearTimeout(moleTimer);
        document.getElementById("finalScore").innerText = `최종 점수: ${score}점 (Stage ${stage})`;
        document.getElementById("gameOverScreen").style.display = "flex";
    }
</script>
</body>
</html>
