
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>시은가은 두더지게임</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff9800">

<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(#87CEEB,#e0f7ff);
margin:0;
padding:0;
touch-action:manipulation;
}

.dadCount{
color:red;
font-weight:bold;
font-size:22px;
}

h2{
margin-top:20px;
font-size:30px;
}

#info{
font-size:20px;
margin:15px;
background:white;
display:inline-block;
padding:10px 20px;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

#board{
width:95vw;
max-width:420px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4vw;
}

.hole{
width:100%;
aspect-ratio:1/1;
background:radial-gradient(circle,#7a451e,#3b1f0f);
border-radius:25px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
overflow:hidden;

box-shadow:
inset 0 8px 15px rgba(0,0,0,0.5),
0 6px 10px rgba(0,0,0,0.3);
}

.hole img{
width:70%;
height:70%;
object-fit:contain;
pointer-events:none;
animation:popUp 0.15s ease;
}

@keyframes popUp{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

button{
font-size:22px;
padding:14px 34px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff9800;
color:white;
font-weight:bold;
}

.scorePopup{
position:fixed;
font-size:40px;
font-weight:bold;
animation:pop 0.8s ease forwards;
pointer-events:none;
}

@keyframes pop{
0%{transform:translateY(10px);opacity:0;}
100%{transform:translateY(-50px);opacity:1;}
}

#gameOverScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:28px;
z-index:999;
}

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
font-size:80px;
font-weight:bold;
color:white;
background:rgba(0,0,0,0.6);
z-index:998;
}

#stagePopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
color:white;
background:rgba(0,0,0,0.6);
z-index:1000;
}
</style>
</head>

<body>

<h2>시은가은 두더지게임</h2>

<div id="info">

Stage : <span id="stage">1</span> |
점수 : <span id="score">0</span> |
최고점수 : <span id="best">0</span> |
시간 : <span id="time">30</span>
아빠 : <span id="dad" class="dadCount">0</span>/3 |
</div>

<div id="board"></div>

<button onclick="startCountdown()">게임 시작</button>

<div id="gameOverScreen">
<h1>게임 종료</h1>
<p id="finalScore"></p>
<button onclick="restartGame()">다시하기</button>
</div>

<div id="countdown"></div>
<div id="stagePopup"></div>

<script>

let score=0
let time=20
let stage=1
let speed=900
let dadHit=0

let gameTimer
let moleTimer

const board=document.getElementById("board")

let bestScore=localStorage.getItem("bestScore") || 0
document.getElementById("best").innerText=bestScore

let bestStage=localStorage.getItem("bestStage") || 0

let audioCtx=null

function playSound(freq){

try{

if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)()
}

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.start()

gain.gain.exponentialRampToValueAtTime(
0.00001,
audioCtx.currentTime+0.2
)

osc.stop(audioCtx.currentTime+0.2)

}catch(e){}

}

function showScore(hole,text,color){

let rect=hole.getBoundingClientRect()

let popup=document.createElement("div")
popup.className="scorePopup"
popup.innerText=text
popup.style.color=color

popup.style.left=(rect.left+rect.width/2)+"px"
popup.style.top=(rect.top+rect.height/2)+"px"

document.body.appendChild(popup)

setTimeout(()=>popup.remove(),800)

}

function showStage(){

const popup=document.getElementById("stagePopup")

popup.innerText="STAGE "+stage
popup.style.display="flex"

setTimeout(()=>{
popup.style.display="none"
},1200)

}

for(let i=0;i<9;i++){

let hole=document.createElement("div")
hole.className="hole"

hole.onclick=()=>{

let type=hole.dataset.type
if(!type) return

if(type=="sieun"){
score+=10
playSound(700)
showScore(hole,"+10","yellow")
}

if(type=="gaeun"){
score+=10
playSound(700)
showScore(hole,"+10","yellow")
}

if(type=="doll"){
score+=20
playSound(1000)
showScore(hole,"+20","lime")
}

if(type=="dad"){

score-=20
dadHit++

playSound(200)
showScore(hole,"-20","red")

if(navigator.vibrate){
navigator.vibrate([100,50,100])
}

document.getElementById("dad").innerText=dadHit

if(dadHit>=3){
gameOver()
}

}

document.getElementById("score").innerText=score

hole.innerHTML=""
hole.dataset.type=""

}

board.appendChild(hole)

}

function startCountdown(){

let count=3
const countdown=document.getElementById("countdown")

countdown.style.display="flex"
countdown.innerText=count

let timer=setInterval(()=>{

count--

if(count>0){
countdown.innerText=count
}
else if(count===0){
countdown.innerText="START"
}
else{
clearInterval(timer)
countdown.style.display="none"
startGame()
}

},1000)

}

function startGame(){

score=0
time=20
stage=1
speed=900
dadHit=0

document.getElementById("score").innerText=score
document.getElementById("time").innerText=time
document.getElementById("stage").innerText=stage
document.getElementById("dad").innerText=dadHit

clearInterval(gameTimer)
clearInterval(moleTimer)

gameTimer=setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time<=0){

if(score < 100){
gameOver()
}else{
nextStage()
}

}

},1000)

moleTimer=setInterval(showCharacter,speed)

}

function nextStage(){

if(stage >= 10){
gameOver()
return
}

stage++
speed -= 50
time=20

showStage()

document.getElementById("stage").innerText=stage
document.getElementById("time").innerText=time

clearInterval(moleTimer)
moleTimer=setInterval(showCharacter,speed)

}

function gameOver(){

clearInterval(gameTimer)
clearInterval(moleTimer)

if(score>bestScore){
bestScore=score
localStorage.setItem("bestScore",bestScore)
document.getElementById("best").innerText=bestScore
}

if(stage>bestStage){
bestStage=stage
localStorage.setItem("bestStage",bestStage)
}

document.getElementById("finalScore").innerText=
"점수 : "+score+
"\nStage : "+stage+
"\n최고 Stage : "+bestStage

document.getElementById("gameOverScreen").style.display="flex"

}

function restartGame(){

document.getElementById("gameOverScreen").style.display="none"
startCountdown()

}

function showCharacter(){

const holes=document.querySelectorAll(".hole")

holes.forEach(h=>{
h.innerHTML=""
h.dataset.type=""
})

let count = stage >=4 ? 2 : 1

let used=[]

for(let i=0;i<count;i++){

let randomHole

do{
randomHole=Math.floor(Math.random()*9)
}while(used.includes(randomHole))

used.push(randomHole)

let r=Math.random()

let dadChance = 0.05 + (stage-1)*0.02
if(dadChance>0.25) dadChance=0.25

let img=""
let type=""

if(r<0.35){
img="sieun.png"
type="sieun"
}
else if(r<0.70){
img="gaeun.png"
type="gaeun"
}
else if(r < 1-dadChance){
img="doll.png"
type="doll"
}
else{
img="dad.png"
type="dad"
}

holes[randomHole].innerHTML="<img src='"+img+"'>"
holes[randomHole].dataset.type=type

}

}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>
</body>
</html>
